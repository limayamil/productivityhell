<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { background: var(--hell-black); padding: 24px; }
  .specimen { margin-bottom: 20px; border-bottom: 1px solid var(--hell-border); padding-bottom: 20px; }
  .specimen:last-child { border-bottom: none; margin-bottom: 0; }
  .meta { display: flex; gap: 12px; margin-bottom: 6px; }
  .tag { font-family: var(--font-mono); font-size: 9px; color: var(--text-dim); background: var(--hell-surface); padding: 2px 6px; border-radius: 2px; border: 1px solid var(--hell-border); }
  .display-xl { font-family: var(--font-display); font-size: 72px; letter-spacing: 0.04em; line-height: 1; text-transform: uppercase; color: var(--text-primary); }
  .display-lg { font-family: var(--font-display); font-size: 48px; letter-spacing: 0.04em; line-height: 1; text-transform: uppercase; color: var(--text-primary); }
  .display-md { font-family: var(--font-display); font-size: 36px; letter-spacing: 0.04em; line-height: 1; text-transform: uppercase; color: var(--text-primary); }
  .display-sm { font-family: var(--font-display); font-size: 24px; letter-spacing: 0.04em; line-height: 1; text-transform: uppercase; color: var(--text-primary); }
  .accent-red { color: var(--hell-red); }
  .accent-gold { color: var(--loot-gold); }
</style>
</head>
<body>
  <div class="specimen">
    <div class="meta"><span class="tag">Bebas Neue</span><span class="tag">72px</span><span class="tag">display-xl</span></div>
    <div class="display-xl">Productivity <span class="accent-red">Hell</span></div>
  </div>
  <div class="specimen">
    <div class="meta"><span class="tag">Bebas Neue</span><span class="tag">48px</span><span class="tag">display-lg</span></div>
    <div class="display-lg">Round <span class="accent-gold">03</span> · Hell Mode</div>
  </div>
  <div class="specimen">
    <div class="meta"><span class="tag">Bebas Neue</span><span class="tag">36px</span><span class="tag">display-md</span></div>
    <div class="display-md">Multiplier <span class="accent-red">Awakened</span></div>
  </div>
  <div class="specimen">
    <div class="meta"><span class="tag">Bebas Neue</span><span class="tag">24px</span><span class="tag">display-sm</span></div>
    <div class="display-sm">Combo ignited · Focus pact activated</div>
  </div>
</body>
</html>
