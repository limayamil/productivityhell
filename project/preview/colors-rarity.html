<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { background: var(--hell-black); padding: 20px; }
  .grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px; }
  .swatch { border-radius: var(--radius-md); overflow: hidden; }
  .swatch-color { height: 56px; display: flex; align-items: center; justify-content: center; }
  .diamond { width: 18px; height: 18px; background: rgba(0,0,0,0.4); transform: rotate(45deg); }
  .swatch-info { background: var(--hell-surface); padding: 8px; border: 1px solid rgba(255,255,255,0.05); }
  .swatch-name { font-family: var(--font-ui); font-size: 10px; font-weight: 600; color: var(--text-primary); }
  .swatch-hex { font-family: var(--font-mono); font-size: 9px; color: var(--text-secondary); margin-top: 2px; }
  .hellborn { background: linear-gradient(135deg, #FF3B3B, #8F5CFF); animation: hbpulse 2s ease-in-out infinite alternate; }
  @keyframes hbpulse { from { filter: brightness(1); } to { filter: brightness(1.3); } }
</style>
</head>
<body>
<div class="grid">
  <div class="swatch">
    <div class="swatch-color" style="background:#1C1C2A; border: 2px solid #8A8A9A; box-shadow: 0 0 8px #8A8A9A30;">
      <div class="diamond" style="background:#8A8A9A;"></div>
    </div>
    <div class="swatch-info"><div class="swatch-name">Common</div><div class="swatch-hex">#8A8A9A</div></div>
  </div>
  <div class="swatch">
    <div class="swatch-color" style="background:#1C1C2A; border: 2px solid #7CFF6B; box-shadow: 0 0 8px #7CFF6B40;">
      <div class="diamond" style="background:#7CFF6B;"></div>
    </div>
    <div class="swatch-info"><div class="swatch-name">Uncommon</div><div class="swatch-hex">#7CFF6B</div></div>
  </div>
  <div class="swatch">
    <div class="swatch-color" style="background:#1C1C2A; border: 2px solid #3DDCFF; box-shadow: 0 0 8px #3DDCFF40;">
      <div class="diamond" style="background:#3DDCFF;"></div>
    </div>
    <div class="swatch-info"><div class="swatch-name">Rare</div><div class="swatch-hex">#3DDCFF</div></div>
  </div>
  <div class="swatch">
    <div class="swatch-color" style="background:#1C1C2A; border: 2px solid #8F5CFF; box-shadow: 0 0 12px #8F5CFF50;">
      <div class="diamond" style="background:#8F5CFF;"></div>
    </div>
    <div class="swatch-info"><div class="swatch-name">Epic</div><div class="swatch-hex">#8F5CFF</div></div>
  </div>
  <div class="swatch">
    <div class="swatch-color" style="background:#1C1C2A; border: 2px solid #FFD166; box-shadow: 0 0 14px #FFD16660;">
      <div class="diamond" style="background:#FFD166;"></div>
    </div>
    <div class="swatch-info"><div class="swatch-name">Legendary</div><div class="swatch-hex">#FFD166</div></div>
  </div>
  <div class="swatch">
    <div class="swatch-color" style="background:#1C1C2A; border: 2px solid #FF3B3B; box-shadow: 0 0 14px #FF3B3B60;">
      <div class="diamond" style="background:#FF3B3B;"></div>
    </div>
    <div class="swatch-info"><div class="swatch-name">Cursed</div><div class="swatch-hex">#FF3B3B</div></div>
  </div>
  <div class="swatch">
    <div class="swatch-color hellborn" style="border: 2px solid #FF3B3B;">
      <div class="diamond" style="background:rgba(255,255,255,0.9);"></div>
    </div>
    <div class="swatch-info"><div class="swatch-name">Hellborn</div><div class="swatch-hex">Gradient</div></div>
  </div>
</div>
</body>
</html>
