<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { background: var(--hell-black); padding: 20px; }
  .section { margin-bottom: 18px; }
  .label { font-family: var(--font-ui); font-size: 9px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-dim); margin-bottom: 8px; }
  /* Spacing */
  .space-row { display: flex; align-items: center; gap: 10px; margin-bottom: 5px; }
  .space-bar { background: var(--hell-red); height: 6px; border-radius: 1px; }
  .space-val { font-family: var(--font-mono); font-size: 9px; color: var(--text-secondary); width: 80px; }
  .space-name { font-family: var(--font-ui); font-size: 9px; color: var(--text-dim); }
  /* Radius */
  .radius-row { display: flex; gap: 12px; align-items: flex-end; }
  .radius-box { background: var(--hell-elevated); border: 1px solid var(--hell-border); width: 48px; height: 48px; display: flex; flex-direction: column; align-items: center; justify-content: flex-end; padding-bottom: 5px; }
  .radius-lbl { font-family: var(--font-mono); font-size: 8px; color: var(--text-dim); margin-top: 4px; text-align: center; }
  /* Shadows */
  .shadow-row { display: flex; gap: 16px; flex-wrap: wrap; }
  .shadow-box { width: 80px; height: 48px; background: var(--hell-elevated); border-radius: var(--radius-md); }
  .shadow-lbl { font-family: var(--font-mono); font-size: 8px; color: var(--text-dim); margin-top: 6px; text-align: center; }
</style>
</head>
<body>
  <div class="section">
    <div class="label">Spacing Scale (4px base)</div>
    <div class="space-row"><div class="space-val">--space-1 / 4px</div><div class="space-bar" style="width:4px;"></div></div>
    <div class="space-row"><div class="space-val">--space-2 / 8px</div><div class="space-bar" style="width:8px;"></div></div>
    <div class="space-row"><div class="space-val">--space-3 / 12px</div><div class="space-bar" style="width:12px;"></div></div>
    <div class="space-row"><div class="space-val">--space-4 / 16px</div><div class="space-bar" style="width:16px;"></div></div>
    <div class="space-row"><div class="space-val">--space-6 / 24px</div><div class="space-bar" style="width:24px;"></div></div>
    <div class="space-row"><div class="space-val">--space-8 / 32px</div><div class="space-bar" style="width:32px;"></div></div>
    <div class="space-row"><div class="space-val">--space-12 / 48px</div><div class="space-bar" style="width:48px;"></div></div>
  </div>
  <div class="section">
    <div class="label">Border Radius</div>
    <div class="radius-row">
      <div><div class="radius-box" style="border-radius:4px;"></div><div class="radius-lbl">sm · 4px</div></div>
      <div><div class="radius-box" style="border-radius:6px;"></div><div class="radius-lbl">md · 6px</div></div>
      <div><div class="radius-box" style="border-radius:8px;"></div><div class="radius-lbl">lg · 8px</div></div>
      <div><div class="radius-box" style="border-radius:100px; width:60px; height:24px;"></div><div class="radius-lbl">pill</div></div>
    </div>
  </div>
  <div class="section">
    <div class="label">Shadow System</div>
    <div class="shadow-row">
      <div>
        <div class="shadow-box" style="box-shadow: 4px 4px 0px #000;"></div>
        <div class="shadow-lbl">hard drop</div>
      </div>
      <div>
        <div class="shadow-box" style="box-shadow: 0 0 16px #FF3B3B40; border:1px solid #FF3B3B40;"></div>
        <div class="shadow-lbl">glow-red</div>
      </div>
      <div>
        <div class="shadow-box" style="box-shadow: 0 0 16px #FFD16640; border:1px solid #FFD16640;"></div>
        <div class="shadow-lbl">glow-gold</div>
      </div>
      <div>
        <div class="shadow-box" style="box-shadow: 4px 4px 0px #000, 0 0 12px #8F5CFF40; border:1px solid #8F5CFF60;"></div>
        <div class="shadow-lbl">hard + glow</div>
      </div>
    </div>
  </div>
</body>
</html>
